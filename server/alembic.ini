# Alembic configuration. Alembic is our database migration tool: instead of
# hand-editing tables, we generate versioned migration scripts and apply them.
# The actual database URL is injected in migrations/env.py from our settings,
# so it is NOT hardcoded here.

[alembic]
script_location = migrations
prepend_sys_path = .

# --- Logging (kept minimal) ---
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
