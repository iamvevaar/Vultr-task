# Production stack for a single Vultr host.
#   caddy (:80/:443, auto-HTTPS)  →  frontend (Next.js) + api (FastAPI)
#   + worker + postgres (all internal; only Caddy is exposed to the internet)
#
# Config comes from a single `.env` file in this directory (see .env.prod.example).
# Run:  docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./server
    # Apply migrations on boot, then run the server WITHOUT --reload (prod).
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./server
    command: python -m app.worker.worker
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_BASE_URL: /api   # same-origin, proxied by Caddy
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - frontend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
